# build-deb.yml — builds .deb packages for Debian/Ubuntu
# Triggered on pushes to master and on release tags.
# Produces xdrawchem_*.deb for Ubuntu 24.04 LTS (Noble, amd64).

name: Build DEB packages

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:      # allow manual trigger from the Actions tab

jobs:
  build-deb:
    name: DEB (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            codename: noble

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Set version from VERSION file
        run: |
          XDCVER=$(cat VERSION)
          echo "Building version: $XDCVER"
          echo "XDCVER=${XDCVER}" >> $GITHUB_ENV
          # Convert X.Yrcz to Debian epoch format: 2:X.Y~rcz-1
          # e.g. 2.0rc3 -> 2:2.0~rc3-1
          DEB_VER=$(echo "$XDCVER" | sed 's/\([0-9.]*\)\(.*\)/2:\1~\2-1/')
          echo "DEB_VER=${DEB_VER}" >> $GITHUB_ENV
          # Prepend a new changelog entry so dpkg-buildpackage picks up the right version
          cd xdrawchem-qt5
          DEBEMAIL="bherger@users.sf.net"
          DEBFULLNAME="Bryan Herger"
          DATE=$(date -R)
          { printf "xdrawchem (%s) unstable; urgency=medium\n\n" "$DEB_VER"
            printf "  * Release %s\n\n" "$XDCVER"
            printf " -- %s <%s>  %s\n\n" "$DEBFULLNAME" "$DEBEMAIL" "$DATE"
            cat debian/changelog; } > debian/changelog.new
          mv debian/changelog.new debian/changelog

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper cmake ninja-build pkg-config \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools \
            libopenbabel-dev \
            libgl-dev libegl-dev \
            libxkbcommon-dev \
            desktop-file-utils \
            fakeroot lintian
          sudo apt-get install -y qt6-svg-dev 2>/dev/null || \
            sudo apt-get install -y libqt6svg6-dev

      # debhelper-compat 13 is handled by debian/compat; 
      # install the actual debhelper package
      - name: Build DEB packages
        working-directory: xdrawchem-qt5
        env:
          DEB_BUILD_OPTIONS: parallel=${{ runner.cpu_count || 2 }}
          QT_QPA_PLATFORM: offscreen
        run: |
          dpkg-buildpackage -us -uc -b
          # Move the resulting .deb files to a known location
          mkdir -p ../debs
          mv ../*.deb ../debs/

      - name: Run lintian
        working-directory: debs
        run: |
          # Run lintian for informational output; don't fail the build on warnings
          lintian --tag-display-limit 0 *.deb || true

      - name: List produced packages
        run: |
          ls -lh debs/
          dpkg-deb --info debs/xdrawchem_*.deb | grep -E "Package|Version|Architecture|Installed-Size"

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: xdrawchem-deb-${{ matrix.codename }}-amd64
          path: debs/*.deb
          retention-days: 30

      # On a tag push, also upload to the release assets (handled by release.yml)
      # Here we just cache the debs for the release job to pick up
      - name: Upload for release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-deb-${{ matrix.codename }}
          path: debs/*.deb
          retention-days: 1
