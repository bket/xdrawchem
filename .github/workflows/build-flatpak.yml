# build-flatpak.yml — validates the Flatpak manifest and produces a test bundle.
# A full Flathub submission requires a separate PR to https://github.com/flathub/flathub.
# This workflow just ensures the manifest builds cleanly on each push.

name: Build Flatpak

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  flatpak:
    name: Flatpak (KDE 6.8)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-builder-lint:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Add Flathub remote and install KDE SDK
        run: |
          # flatpak and flatpak-builder are pre-installed in the lint container.
          # apt-get is not available (Alpine-based image).
          flatpak remote-add --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo || true
          flatpak install -y flathub \
            org.kde.Platform//6.8 \
            org.kde.Sdk//6.8

      - name: Build Flatpak bundle
        run: |
          # --disable-rofiles-fuse: rofiles-fuse requires dbus + machine-id
          # which are not available in CI containers. This flag skips the
          # read-only FUSE overlay; the build is otherwise identical.
          flatpak-builder --repo=flatpak-repo --force-clean \
            --disable-rofiles-fuse \
            build-dir org.xdrawchem.XDrawChem.yml

      - name: Export bundle
        run: |
          flatpak build-bundle flatpak-repo \
            XDrawChem.flatpak org.xdrawchem.XDrawChem

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v7.0.0
        with:
          name: xdrawchem-flatpak
          path: XDrawChem.flatpak
          retention-days: 30
