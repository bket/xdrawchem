# build-windows.yml — Windows installer build
#
# Builds XDrawChem on Windows using MSVC (via Qt6 official installer via aqtinstall)
# and OpenBabel pre-built binaries, then packages with NSIS into a .exe installer.
# Runs on tag pushes (for releases) and PRs (smoke-testing).

name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'xdrawchem-qt5/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

env:
  QT_VERSION: '6.7.3'
  QT_ARCH: win64_msvc2019_64
  OPENBABEL_VERSION: '3.1.1'

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5.0.1

      # Set up MSVC environment first — required by both OpenBabel
      # and XDrawChem cmake builds (provides cl.exe, nmake, ninja).
      - name: Set up MSVC
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          set >> "%GITHUB_ENV%"

      - name: Install Qt6 via aqtinstall
        run: |
          pip install aqtinstall
          # Qt SVG is bundled in the Qt6 base desktop package since Qt 6.5;
          # do not pass --modules (aqtinstall 3.x fails to find "qtsvg" by
          # that name for 6.7.3 because it is already in the base archive).
          aqt install-qt windows desktop ${{ env.QT_VERSION }} ${{ env.QT_ARCH }} `
            --outputdir C:\Qt
        shell: pwsh

      - name: Cache OpenBabel build
        id: cache-openbabel
        uses: actions/cache@v4  # v4 is the current latest; Node22 not yet available
        with:
          path: C:\OpenBabel
          key: openbabel-3.1.1-msvc-x64

      - name: Build OpenBabel from source
        if: steps.cache-openbabel.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Clone the 3.1.1 release tag (shallow)
          git clone --depth 1 --branch openbabel-3-1-1 `
            https://github.com/openbabel/openbabel.git ob-src

          # Patch all OB sources: std::binary_function was removed in C++17.
          # Affected files in OB 3.1.1 include headers AND .cpp files
          # (e.g. plugin.h, inchiformat.h, src/ops/sort.cpp).
          # Scan both include/ and src/ with one pass.
          # Regex handles one level of nested <> (e.g. std::pair<double,T>):
          $pattern = ': public std::binary_function<(?:[^<>]|<[^<>]*>)*>'
          Get-ChildItem ob-src -Recurse -Include "*.h","*.cpp" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            if ($content -match "binary_function") {
              $patched = $content -replace $pattern, ''
              Set-Content $_.FullName $patched
              Write-Host "Patched: $($_.FullName.Replace((Get-Location).Path + `"\\\`", ''))"
            }
          }

          # Wrap the formats_xml block with if(FALSE)...endif().
          # The debug print revealed OB 3.1.1 uses add_library(formats_xml ... xml/xml.cpp)
          # inline without any if(LIBXML2_FOUND) guard. Must wrap with if(FALSE).
          $flines = [System.IO.File]::ReadAllLines("ob-src/src/formats/CMakeLists.txt")
          $startIdx = -1; $endIdx = -1
          for ($i = 0; $i -lt $flines.Count; $i++) {
            if ($startIdx -lt 0 -and $flines[$i] -match "set\(xmlsources") { $startIdx = $i }
            if ($flines[$i] -match "LIBXML2_LIBRARIES") { $endIdx = $i }
          }
          # advance endIdx to the endforeach line
          if ($endIdx -ge 0) {
            while ($endIdx -lt $flines.Count -and $flines[$endIdx] -notmatch "endforeach") { $endIdx++ }
          }
          Write-Host "xml section: lines $startIdx to $endIdx"
          if ($startIdx -ge 0 -and $endIdx -gt $startIdx) {
            $out = $flines[0..($startIdx-1)] + @("if(FALSE) # no libxml2") + `
                   $flines[$startIdx..$endIdx] + @("endif()") + `
                   $flines[($endIdx+1)..($flines.Count-1)]
            [System.IO.File]::WriteAllLines("ob-src/src/formats/CMakeLists.txt", $out)
            Write-Host "Wrapped xml section with if(FALSE)"
          } else {
            Write-Host "WARNING: could not find xml section boundaries"
          }

          cmake -S ob-src -B ob-build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=C:\OpenBabel `
            -DBUILD_GUI=OFF `
            -DENABLE_TESTS=OFF `
            -DWITH_INCHI=OFF `
            -DWITH_MAEPARSER=OFF `
            -DWITH_COORDGEN=OFF `
            -DBUILD_SHARED=ON `
            -DCMAKE_DISABLE_FIND_PACKAGE_LibXml2=TRUE `
            -DCMAKE_DISABLE_FIND_PACKAGE_ZLIB=TRUE `
            -DCMAKE_DISABLE_FIND_PACKAGE_Cairo=TRUE `
            -DCMAKE_DISABLE_FIND_PACKAGE_Boost=TRUE

          cmake --build ob-build --config Release -j $env:NUMBER_OF_PROCESSORS
          if ($LASTEXITCODE -ne 0) { throw "OpenBabel build failed" }
          cmake --install ob-build --config Release
          if ($LASTEXITCODE -ne 0) { throw "OpenBabel install failed" }

          Write-Host "OpenBabel installed to C:\OpenBabel"
          Get-ChildItem C:\OpenBabel -Depth 2 | Select-Object FullName

      - name: Export OpenBabel path
        shell: pwsh
        run: |
          echo "OB_ROOT=C:\OpenBabel" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: pwsh
        run: |
          $QT_DIR = "C:\Qt\${{ env.QT_VERSION }}\msvc2019_64"

          $OB_ROOT = $env:OB_ROOT
          # Determine the correct lib name (may be openbabel or openbabel3)
          # OB on Windows puts import libs in lib\ or bin\ depending on build
          # Dump all .lib files to identify the correct name
          Write-Host "All .lib files in OB_ROOT:"
          Get-ChildItem $OB_ROOT -Recurse -Filter "*.lib" | Select-Object FullName
          $OB_LIB = @(
            "$OB_ROOT\lib\openbabel-3.lib",
            "$OB_ROOT\lib\openbabel3.lib",
            "$OB_ROOT\lib\openbabel.lib",
            "$OB_ROOT\bin\openbabel-3.lib",
            "$OB_ROOT\bin\openbabel3.lib",
            "$OB_ROOT\bin\openbabel.lib"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $OB_LIB) {
            throw "OpenBabel import lib not found in OB_ROOT (see lib listing above)"
          }
          Write-Host "Using OB lib: $OB_LIB"
          cmake -S xdrawchem-qt5 -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$QT_DIR" `
            -DRINGHOME="ring" `
            -DOpenBabel_FOUND=TRUE `
            "-DOpenBabel_INCLUDE_DIR=$OB_ROOT\include\openbabel3" `
            "-DOpenBabel_INCLUDE_DIRS=$OB_ROOT\include\openbabel3" `
            "-DOpenBabel_LIBRARY=$OB_LIB" `
            "-DOpenBabel_LIBRARIES=$OB_LIB"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Gather runtime dependencies (windeployqt)
        shell: pwsh
        run: |
          $QT_BIN = "C:\Qt\${{ env.QT_VERSION }}\msvc2019_64\bin"
          $OB_BIN = "$env:OB_ROOT\bin"

          New-Item -ItemType Directory -Force -Path dist\xdrawchem | Out-Null

          # Copy built binary
          Copy-Item build\xdrawchem.exe dist\xdrawchem\

          # Copy ring data
          New-Item -ItemType Directory -Force -Path dist\xdrawchem\ring | Out-Null
          Copy-Item xdrawchem-qt5\ring\* dist\xdrawchem\ring\ -Recurse

          # Copy Qt runtime DLLs
          & "$QT_BIN\windeployqt.exe" `
            --release `
            --no-translations `
            dist\xdrawchem\xdrawchem.exe

          # Copy OpenBabel runtime DLLs from vcpkg
          $OB_BIN = "$env:OB_ROOT\bin"
          if (Test-Path $OB_BIN) {
            Copy-Item "$OB_BIN\*.dll" dist\xdrawchem\ -ErrorAction SilentlyContinue
          }
          # Copy OB format plugins
          $OB_PLUGINS = "$env:OB_ROOT\bin\openbabel"
          if (Test-Path $OB_PLUGINS) {
            New-Item -ItemType Directory -Force -Path dist\xdrawchem\openbabel | Out-Null
            Copy-Item "$OB_PLUGINS\*.obf" dist\xdrawchem\openbabel\ -ErrorAction SilentlyContinue
          }

          # Copy MSVC runtime (if present)
          Get-ChildItem "C:\Windows\System32\vcruntime*.dll" |
            Copy-Item -Destination dist\xdrawchem\ -ErrorAction SilentlyContinue
          Get-ChildItem "C:\Windows\System32\msvcp*.dll" |
            Copy-Item -Destination dist\xdrawchem\ -ErrorAction SilentlyContinue

          Write-Host "=== dist\xdrawchem contents ==="
          Get-ChildItem dist\xdrawchem -Recurse | Select-Object FullName

      - name: Install NSIS
        run: choco install nsis --no-progress -y
        shell: pwsh

      - name: Write NSIS installer script
        shell: pwsh
        run: |
          # Version: prefer git tag (strip leading v), fall back to VERSION file
          $VERSION = if ($env:GITHUB_REF_NAME -match '^v') {
            $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            (Get-Content "$env:GITHUB_WORKSPACE\VERSION" -Raw).Trim()
          }

          @"
          !define APPNAME     "XDrawChem"
          !define APPVERSION  "$VERSION"
          !define PUBLISHER   "Bryan Herger"
          !define APPURL      "https://github.com/bryanherger/xdrawchem"
          !define INSTALLEREXE "XDrawChem-$VERSION-windows-x64.exe"

          Name "`${APPNAME} `${APPVERSION}"
          OutFile "`${INSTALLEREXE}"
          InstallDir "`$PROGRAMFILES64\XDrawChem"
          InstallDirRegKey HKLM "Software\XDrawChem" "InstallDir"
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma

          !include "MUI2.nsh"
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "XDrawChem" SecMain
            SetOutPath "`$INSTDIR"
            File /r "dist\xdrawchem\*.*"

            ; Registry entries
            WriteRegStr HKLM "Software\XDrawChem" "InstallDir" "`$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\XDrawChem" \
              "DisplayName"          "XDrawChem `${APPVERSION}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\XDrawChem" \
              "UninstallString"      "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\XDrawChem" \
              "Publisher"            "`${PUBLISHER}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\XDrawChem" \
              "URLInfoAbout"         "`${APPURL}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\XDrawChem" \
              "DisplayVersion"       "`${APPVERSION}"

            ; Uninstaller
            WriteUninstaller "`$INSTDIR\uninstall.exe"

            ; Start Menu shortcut
            CreateDirectory "`$SMPROGRAMS\XDrawChem"
            CreateShortCut  "`$SMPROGRAMS\XDrawChem\XDrawChem.lnk" \
              "`$INSTDIR\xdrawchem.exe"
            CreateShortCut  "`$SMPROGRAMS\XDrawChem\Uninstall.lnk" \
              "`$INSTDIR\uninstall.exe"

            ; Desktop shortcut
            CreateShortCut "`$DESKTOP\XDrawChem.lnk" "`$INSTDIR\xdrawchem.exe"

            ; File associations
            WriteRegStr HKCR ".mol"  "" "XDrawChem.molfile"
            WriteRegStr HKCR "XDrawChem.molfile" "" "Chemical Structure (MDL Molfile)"
            WriteRegStr HKCR "XDrawChem.molfile\shell\open\command" "" \
              '"`$INSTDIR\xdrawchem.exe" "%1"'
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$SMPROGRAMS\XDrawChem\XDrawChem.lnk"
            Delete "`$SMPROGRAMS\XDrawChem\Uninstall.lnk"
            RMDir  "`$SMPROGRAMS\XDrawChem"
            Delete "`$DESKTOP\XDrawChem.lnk"
            DeleteRegKey HKLM "Software\XDrawChem"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\XDrawChem"
            DeleteRegKey HKCR ".mol"
            DeleteRegKey HKCR "XDrawChem.molfile"
          SectionEnd
          "@ | Out-File -Encoding UTF8 installer.nsi

      - name: Build installer with NSIS
        shell: pwsh
        run: |
          # Locate makensis — it may be pre-installed or installed by choco
          $makensis = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            $makensis = (Get-Command makensis -ErrorAction SilentlyContinue)?.Source
          }
          if (-not $makensis) {
            Write-Host "makensis not found, reinstalling NSIS..."
            choco install nsis --no-progress -y --force
            $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          }
          Write-Host "Using makensis: $makensis"
          & $makensis installer.nsi
          Get-ChildItem *.exe | Select-Object Name, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-windows
          path: XDrawChem-*-windows-x64.exe
          retention-days: 14
