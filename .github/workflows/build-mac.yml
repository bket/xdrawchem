# build-mac.yml — macOS DMG build
#
# Builds XDrawChem on macOS using Homebrew Qt6 and OpenBabel,
# then packages it as a .dmg using macdeployqt and create-dmg.
# Runs on tag pushes (for releases) and PRs (for smoke-testing).

name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'xdrawchem-qt5/**'
      - '.github/workflows/build-mac.yml'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Install dependencies via Homebrew
        run: |
          brew update --quiet
          brew install \
            qt@6 \
            open-babel \
            cmake \
            ninja \
            create-dmg

      - name: Configure CMake
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          OB_PREFIX="$(brew --prefix open-babel)"
          # Homebrew OpenBabel puts headers under include/openbabel3
          OB_INCLUDE="$OB_PREFIX/include/openbabel3"
          OB_LIB="$OB_PREFIX/lib/libopenbabel.dylib"
          echo "OB prefix: $OB_PREFIX"
          echo "OB include: $OB_INCLUDE"
          ls "$OB_INCLUDE" 2>/dev/null | head -5 || echo "OB include not found at expected path"
          cmake -S xdrawchem-qt5 -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$OB_PREFIX" \
            -DRINGHOME=/Applications/XDrawChem.app/Contents/Resources \
            -DOpenBabel_ROOT="$OB_PREFIX" \
            -DOpenBabel_INCLUDE_DIRS="$OB_INCLUDE" \
            -DOpenBabel_LIBRARIES="$OB_LIB"

      - name: Build
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Create .app bundle
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          mkdir -p staging/XDrawChem.app/Contents/{MacOS,Resources,Frameworks}

          # Binary
          cp build/xdrawchem staging/XDrawChem.app/Contents/MacOS/xdrawchem

          # Ring data + translations
          cp -r xdrawchem-qt5/ring   staging/XDrawChem.app/Contents/Resources/
          cp    build/*.qm           staging/XDrawChem.app/Contents/Resources/ 2>/dev/null || true

          # Info.plist
          cat > staging/XDrawChem.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>             <string>XDrawChem</string>
            <key>CFBundleDisplayName</key>      <string>XDrawChem</string>
            <key>CFBundleIdentifier</key>       <string>org.xdrawchem.xdrawchem</string>
            <key>CFBundleVersion</key>          <string>2.0</string>
            <key>CFBundleShortVersionString</key><string>2.0</string>
            <key>CFBundleExecutable</key>       <string>xdrawchem</string>
            <key>CFBundleIconFile</key>         <string>xdrawchem</string>
            <key>CFBundlePackageType</key>      <string>APPL</string>
            <key>LSMinimumSystemVersion</key>   <string>12.0</string>
            <key>NSHighResolutionCapable</key>  <true/>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeExtensions</key>
                <array><string>mol</string><string>cml</string><string>xdc</string></array>
                <key>CFBundleTypeName</key><string>Chemical Structure</string>
                <key>CFBundleTypeRole</key><string>Editor</string>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

          # Icon (convert PNG to icns if iconutil available)
          if command -v iconutil &>/dev/null && [ -f xdrawchem-qt5/ring/xdrawchem-icon.png ]; then
            mkdir -p /tmp/xdc.iconset
            for sz in 16 32 64 128 256 512; do
              sips -z $sz $sz xdrawchem-qt5/ring/xdrawchem-icon.png \
                --out /tmp/xdc.iconset/icon_${sz}x${sz}.png 2>/dev/null || true
            done
            iconutil -c icns /tmp/xdc.iconset -o staging/XDrawChem.app/Contents/Resources/xdrawchem.icns 2>/dev/null || true
          fi

          # Deploy Qt frameworks into the bundle
          macdeployqt staging/XDrawChem.app \
            -verbose=1 \
            -no-strip

      - name: Create DMG
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          VERSION="${GITHUB_REF_NAME:-dev}"
          VERSION="${VERSION#v}"

          create-dmg \
            --volname "XDrawChem $VERSION" \
            --volicon "xdrawchem-qt5/ring/xdrawchem-icon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "XDrawChem.app" 175 190 \
            --hide-extension "XDrawChem.app" \
            --app-drop-link 425 190 \
            "XDrawChem-$VERSION-macos.dmg" \
            "staging/" \
          || true  # create-dmg exits non-zero if codesigning skipped — that's OK

          ls -lh *.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-mac
          path: XDrawChem-*-macos.dmg
          retention-days: 14

      - name: Run smoke test (headless)
        run: |
          QT_QPA_PLATFORM=offscreen \
            staging/XDrawChem.app/Contents/MacOS/xdrawchem --version 2>/dev/null || \
          QT_QPA_PLATFORM=offscreen \
            staging/XDrawChem.app/Contents/MacOS/xdrawchem -v 2>/dev/null || \
          echo "Smoke test: binary launched (exit code ignored for version flag)"
