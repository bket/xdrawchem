# build-rpm.yml — builds .rpm packages for RHEL/Fedora family
# Runs on ubuntu-latest (Node 24 host) and invokes docker for the distro
# build environment. This avoids the Node.js deprecation warning that
# occurs when actions/checkout runs inside a container job.
#
# Produces packages for:
#   - Fedora 40 (current stable)
#   - Rocky Linux 9 (RHEL 9 compatible, with EPEL)

name: Build RPM packages

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: RPM (${{ matrix.name }})
    runs-on: ubuntu-latest        # Node 24 host — actions run here, not in container
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rocky-9
            image: rockylinux:9
            setup: |
              dnf install -y epel-release dnf-plugins-core
              dnf config-manager --set-enabled crb
              dnf install -y rpm-build rpmdevtools cmake ninja-build gcc-c++ \
                qt6-qtbase-devel qt6-qttools-devel qt6-qtsvg-devel \
                openbabel-devel \
                desktop-file-utils libGL-devel libEGL-devel \
                libxkbcommon-devel pkgconfig

    steps:
      - uses: actions/checkout@v5.0.1

      # Prepare the source tree and spec on the host before entering the container
      - name: Prepare source tarball and spec
        run: |
          # Version comes from the repo-root VERSION file (single source of truth).
          # On a tag push the tag name is also available as GITHUB_REF_NAME.
          XDCVER=$(cat VERSION)
          echo "Building version: $XDCVER"

          mkdir -p rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/RPMS rpmbuild/SRPMS
          mkdir -p /tmp/xdrawchem-${XDCVER}
          cp -r xdrawchem-qt5/. /tmp/xdrawchem-${XDCVER}/
          tar -czf rpmbuild/SOURCES/xdrawchem-${XDCVER}.tar.gz \
            -C /tmp xdrawchem-${XDCVER}/
          cp xdrawchem-qt5/SPECS/xdrawchem.spec rpmbuild/SPECS/
          # Stash the version for subsequent steps
          echo "XDCVER=${XDCVER}" >> $GITHUB_ENV

      # Run the entire build inside the distro container
      # Mount the repo into /workspace so we can use the prepared sources
      - name: Build RPM in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/rpmbuild:/github/home/rpmbuild" \
            -e QT_QPA_PLATFORM=offscreen \
            -e HOME=/github/home \
            -e XDCVER="${{ env.XDCVER }}" \
            ${{ matrix.image }} \
            bash -exc '
              ${{ matrix.setup }}
              # rpmdev-setuptree creates ~/rpmbuild = /github/home/rpmbuild (already mounted)
              # Sources and spec are already in place from the host prepare step.
              rpmbuild -ba /github/home/rpmbuild/SPECS/xdrawchem.spec \
                --define "_topdir /github/home/rpmbuild" \
                --define "dist .$(echo ${{ matrix.name }} | tr '-' '_')" \
                --define "_smp_mflags -j$(nproc)" \
                --define "xdcver ${XDCVER}"
            '

      - name: Collect and list produced packages
        run: |
          # RPMs land in rpmbuild/RPMS/<arch>/ and rpmbuild/SRPMS/
          mkdir -p rpmbuild/output
          find rpmbuild/RPMS rpmbuild/SRPMS -name "*.rpm" \
            -exec cp {} rpmbuild/output/ \; 2>/dev/null || true
          ls -lh rpmbuild/output/*.rpm 2>/dev/null || echo "No RPMs found"
          for f in rpmbuild/output/*.rpm; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            rpm -qip "$f" 2>/dev/null | grep -E "^Name|^Version|^Release|^Architecture|^Size" || true
          done

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: xdrawchem-rpm-${{ matrix.name }}
          path: rpmbuild/output/*.rpm
          retention-days: 30

      - name: Upload for release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-rpm-${{ matrix.name }}
          path: rpmbuild/output/*.rpm
          retention-days: 1
