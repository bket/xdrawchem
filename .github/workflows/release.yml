# release.yml — creates a GitHub Release when a v* tag is pushed.
#
# Triggers directly on v* tag pushes alongside build-deb and build-rpm.
# Polls the GitHub API until the build artifacts appear, then downloads
# them and attaches to the release.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5.0.1

      # Poll until both build workflows upload their release artifacts,
      # or until a 20-minute timeout (whichever comes first).
      - name: Wait for and download build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG:  ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          # Debug: show what head_branch values exist for our artifacts
          # (helps diagnose future tag/branch matching issues)
          echo "=== Artifact head_branch values for this repo ==="
          gh api "repos/$REPO/actions/artifacts?per_page=20" \
            --jq '.artifacts[] | select(.expired == false) | {name:.name, branch:.workflow_run.head_branch, sha:.workflow_run.head_sha}' \
            2>/dev/null | head -40 || true
          echo "TAG=$TAG"
          echo "==="

          MAX_WAIT=1200
          INTERVAL=30
          ELAPSED=0

          fetch_artifact() {
            local NAME="$1"
            local ART_ID
            # head_branch may be the tag name OR the full ref depending on the
            # runner type (container jobs sometimes differ). Match on either form,
            # and also accept head_sha matching the tagged commit as a fallback.
            local TAG_SHA
            TAG_SHA=$(git rev-list -n1 "$TAG" 2>/dev/null || true)
            ART_ID=$(gh api "repos/$REPO/actions/artifacts?name=$NAME&per_page=100" \
              --jq ".artifacts[]
                    | select(.expired == false)
                    | select(
                        (.workflow_run.head_branch == \"$TAG\") or
                        (.workflow_run.head_branch == \"refs/tags/$TAG\") or
                        (.workflow_run.head_sha == \"$TAG_SHA\")
                      )
                    | .id" 2>/dev/null | head -1)
            echo "$ART_ID"
          }

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            DEB_ID=$(fetch_artifact "release-deb-noble")
            RPM_ID=$(fetch_artifact "release-rpm-rocky-9")
            MAC_ID=$(fetch_artifact "release-mac")
            WIN_ID=$(fetch_artifact "release-windows")
            echo "  DEB=${DEB_ID:-(pending)} RPM=${RPM_ID:-(pending)} MAC=${MAC_ID:-(pending)} WIN=${WIN_ID:-(pending)}  (${ELAPSED}s elapsed)"
            if [ -n "$DEB_ID" ] && [ -n "$RPM_ID" ] && [ -n "$MAC_ID" ] && [ -n "$WIN_ID" ]; then
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Download whatever we found (partial release is still useful)
          for NAME in release-deb-noble release-rpm-rocky-9 release-mac release-windows; do
            ART_ID=$(fetch_artifact "$NAME")
            if [ -n "$ART_ID" ]; then
              echo "Downloading artifact $NAME (id=$ART_ID)..."
              gh api "repos/$REPO/actions/artifacts/$ART_ID/zip" > /tmp/art.zip
              unzip -q /tmp/art.zip -d release-assets/
              rm /tmp/art.zip
            else
              echo "Artifact $NAME not found after ${ELAPSED}s — skipping."
            fi
          done

          echo "=== Release assets ==="
          ls -lh release-assets/ || echo "(none)"

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          if [ -f xdrawchem-qt5/CHANGELOG.md ]; then
            awk '/^## /{if(found)exit; found=1; next} found{print}' \
              xdrawchem-qt5/CHANGELOG.md > /tmp/release-notes.md
          else
            echo "See commit history for changes in this release." \
              > /tmp/release-notes.md
          fi
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Delete existing release assets (allow re-tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json assets --jq '.assets[].name' 2>/dev/null | \
          while read -r asset; do
            echo "Deleting existing asset: $asset"
            gh release delete-asset "${{ github.ref_name }}" "$asset" \
              --repo "${{ github.repository }}" --yes 2>/dev/null || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: XDrawChem ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
