# Flatpak manifest for XDrawChem
# Submission target: https://github.com/flathub/flathub
#
# Build locally:
#   flatpak-builder --install --force-clean build-dir org.xdrawchem.XDrawChem.yml
# Test:
#   flatpak run org.xdrawchem.XDrawChem

app-id: org.xdrawchem.XDrawChem
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk

command: xdrawchem

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Network access for PubChem lookups (name-to-structure, Find on PubChem, Molecule Info)
  - --share=network

modules:
  # ── RapidJSON (header-only; required by OpenBabel JSON formats) ──────────────
  # Pre-installing RapidJSON here prevents OpenBabel from trying to download it
  # itself during cmake configure, which fails unreliably in the Flatpak sandbox.
  - name: rapidjson
    buildsystem: cmake-ninja
    config-opts:
      - -DRAPIDJSON_BUILD_DOC=OFF
      - -DRAPIDJSON_BUILD_EXAMPLES=OFF
      - -DRAPIDJSON_BUILD_TESTS=OFF
    build-commands:
      # RapidJSON 1.1.0 has a copy-assignment operator that assigns to a const
      # member (GenericStringRef::length). GCC 14 rejects this even with
      # -fpermissive. Patch the operator to = delete before cmake installs it.
      - sed -i 's/GenericStringRef\& operator=(const GenericStringRef\& rhs) { s = rhs.s; length = rhs.length; }/GenericStringRef\& operator=(const GenericStringRef\& rhs) = delete;/' include/rapidjson/document.h
    cleanup:
      - /lib/cmake
      - /lib/pkgconfig
      - /share/doc
    sources:
      - type: archive
        url: https://github.com/miloyip/rapidjson/archive/refs/tags/v1.1.0.tar.gz
        sha256: bf7ced29704a1e696fbccf2a2b4ea068e7774fa37f6d7dd4039d0787f8bed98e

  # ── OpenBabel ────────────────────────────────────────────────────────────────
  # Not in the KDE SDK; build from source using the same version as Rocky 9 EPEL.
  - name: openbabel
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_GUI=OFF
      - -DBUILD_TESTING=OFF
      - -DENABLE_TESTS=OFF
      - -DWITH_INCHI=ON
      # GCC 14 / musl libc is stricter about transitive includes.
      # OB 3.1.1 obutil.h uses clock()/CLOCKS_PER_SEC without including
      # <ctime>. Force-include it for all OB translation units.
      # GCC 14 / musl: obutil.h uses clock() without <ctime>; force-include it.
      - -DCMAKE_CXX_FLAGS=-include ctime
      # Point OB at the pre-installed RapidJSON so it skips its internal download.
      - -DRAPIDJSON_INCLUDE_DIRS=/app/include
    sources:
      - type: archive
        url: https://github.com/openbabel/openbabel/archive/refs/tags/openbabel-3-1-1.tar.gz
        sha256: c97023ac6300d26176c97d4ef39957f06e68848d64f1a04b0b284ccff2744f02
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - /share/doc
      - /share/man
      - '*.la'
      - '*.a'

  # ── XDrawChem ────────────────────────────────────────────────────────────────
  - name: xdrawchem
    buildsystem: cmake-ninja
    builddir: true
    subdir: xdrawchem-qt5
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DRINGHOME=/app/share/xdrawchem
    sources:
      - type: git
        url: https://github.com/bryanherger/xdrawchem.git
        # Pin to a specific tag for reproducible Flathub builds.
        # Update this tag when submitting a new release.
        # No commit: field — flatpak-builder resolves the SHA from the tag.
        tag: v2.0
